apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-deployment
  labels:
    app: project
spec:
  replicas: 3
  selector:
    matchLabels:
      app: project
  template:
    metadata:
      labels:
        app: project

      # Prometheus scraping annotations (optional but useful)
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"

    spec:
      containers:
      - name: project
        image: ironfang26/project:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000

        # Health checks (recommended for production)
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: project-service
  labels:
    app: project
spec:
  type: LoadBalancer
  selector:
    app: project
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
